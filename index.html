<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ============================ SEO ============================ -->
    <title>Evntiqa — ABM-Powered Executive Roundtables for B2B Tech</title>
    <meta
      name="description"
      content="Evntiqa helps B2B technology companies engage target accounts through executive-led roundtables, account-based marketing, and personalized distribution."
    />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0a1736" />
    <link rel="canonical" href="https://evntiqa.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Evntiqa" />
    <meta property="og:title" content="Evntiqa — ABM-Powered Executive Roundtables for B2B Tech" />
    <meta
      property="og:description"
      content="Evntiqa helps B2B technology companies engage target accounts through executive-led roundtables, account-based marketing, and personalized distribution."
    />
    <meta property="og:url" content="https://evntiqa.com/" />
    <meta property="og:image" content="https://evntiqa.com/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Evntiqa — ABM-Powered Executive Roundtables for B2B Tech" />
    <meta
      name="twitter:description"
      content="Evntiqa helps B2B technology companies engage target accounts through executive-led roundtables, account-based marketing, and personalized distribution."
    />
    <meta name="twitter:image" content="https://evntiqa.com/og-image.png" />

    <!-- Favicons. The ?v=2 cache-busts older variants browsers may have cached. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg?v=2" />
    <link rel="mask-icon" href="/favicon.svg?v=2" color="#1f51fe" />

    <!-- Fonts: Hanken Grotesk (body) + Schibsted Grotesk (display) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Schibsted+Grotesk:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Organization structured data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Evntiqa",
        "url": "https://evntiqa.com/",
        "email": "hello@evntiqa.com",
        "description": "Evntiqa is a B2B engagement media company focused on helping technology brands build awareness, engagement, and demand within their target accounts through executive-led roundtables, account-based marketing, intent-driven engagement, and personalized distribution.",
        "sameAs": ["https://www.linkedin.com/company/evntiqa"]
      }
    </script>

    <!-- Critical boot styles: navy first paint + a single subtle ring so there is no
         jarring transition between this pre-React fallback and the React preloader.
         Both render on the same navy backdrop. -->
    <style>
      html,
      body {
        margin: 0;
        background: #0a1736;
      }
      #root {
        min-height: 100vh;
      }
      .boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #0a1736;
        z-index: 9999;
      }
      .boot i {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 2px solid rgba(80, 118, 255, 0.18);
        border-top-color: #5076ff;
        animation: bootspin 1s cubic-bezier(0.6, 0, 0.4, 1) infinite;
      }
      @keyframes bootspin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot i {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- React replaces the contents of #root on mount; the spinner is the pre-hydration fallback. -->
    <div id="root"><div class="boot"><i></i></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
